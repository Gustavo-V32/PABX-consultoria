services:
  postgres:
    image: postgres:16-alpine
    container_name: omni_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnichannel}
      POSTGRES_USER: ${POSTGRES_USER:-omni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omni_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - omni_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omni}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omni_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - omni_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omni_backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-omni}:${POSTGRES_PASSWORD:-omni_secret}@postgres:5432/${POSTGRES_DB:-omnichannel}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      ASTERISK_HOST: asterisk
      ASTERISK_AMI_ENABLED: "true"
      ASTERISK_CONFIG_PATH: /app/asterisk-conf
    volumes:
      - uploads_data:/app/uploads
      - recordings_data:/app/recordings
      - ./asterisk/conf:/app/asterisk-conf
    ports:
      - "3001:3001"
    networks:
      - omni_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omni_frontend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost}
    ports:
      - "3002:3000"
    networks:
      - omni_net
    depends_on:
      - backend

  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    container_name: omni_asterisk
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - ./asterisk/conf:/etc/asterisk
      - recordings_data:/var/spool/asterisk/monitor
      - asterisk_sounds:/var/lib/asterisk/sounds
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/tcp"
      - "10000-10200:10000-10200/udp"
      - "8088:8088"
    networks:
      - omni_net
    cap_add:
      - SYS_NICE
    privileged: false

  nginx:
    image: nginx:1.25-alpine
    container_name: omni_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/app/uploads:ro
      - ssl_certs:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    networks:
      - omni_net
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  recordings_data:
  asterisk_sounds:
  ssl_certs:

networks:
  omni_net:
    driver: bridge
