; ============================================================
; OmniSuite - Voicemail Configuration
; ============================================================

[general]
format=wav49|gsm|wav
serveremail=noreply@yourdomain.com
attach=yes
skipms=3000
maxsilence=10
silencethreshold=128
maxlogins=3
emaildateformat=%A, %d %B %Y às %H:%M
pagerdateformat=%d/%m/%Y %H:%M
sendvoicemail=yes
maxmsg=100
maxsecs=300
minsecs=3
backupdeleted=100
review=no
operator=no
saycid=yes
forcegreetings=no
forcename=no
hidefromdir=no
tempgreetwarn=yes
messagewrap=no
nextaftercmd=yes
pbxskip=no
fromstring=OmniSuite Voicemail
emailbody=Olá ${VM_NAME},\n\nVocê recebeu uma mensagem de voz de ${VM_CALLERID} às ${VM_DATE}.\nDuração: ${VM_DUR} segundos.\n\nAcesse o ramal *97 para ouvir.\n\nEquipe OmniSuite

[zonemessages]
brasilia=America/Sao_Paulo|'vm-received' Q 'digits/at' IMp

; Caixa de voz padrão - Admin
[default]
2000 => 1234,Supervisor 01,supervisor@yourdomain.com
2100 => 1234,Administrador,admin@yourdomain.com

; Caixas de atendentes
1000 => 1234,Agente 01,agente01@yourdomain.com
1001 => 1234,Agente 02,agente02@yourdomain.com
1002 => 1234,Agente 03,agente03@yourdomain.com
