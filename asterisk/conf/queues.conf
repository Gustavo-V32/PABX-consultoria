; ============================================================
; OmniSuite - Queues Configuration
; ============================================================

[general]
persistentmembers=yes
autofill=yes
monitor-type=MixMonitor
updatecdr=yes
shared_lastcall=yes
log_membername_as_agent=yes

#include queues_omni.conf

; ============================================================
; Queue Templates
; ============================================================

[queue_defaults](!)
; Estratégia: ringall, leastrecent, fewestcalls, random, rrmemory, linear, wrandom
strategy=rrmemory
; Timeout por membro (segundos)
timeout=30
; Tempo de wrap-up após ligação
wrapuptime=5
; Tempo máximo na fila (0=ilimitado)
maxlen=50
; Anunciar posição e tempo estimado
announce-frequency=30
announce-position=yes
announce-holdtime=yes
; Música em espera
musicclass=default
; Tocar arquivo ao entrar na fila
queue-youarenext=queue-youarenext
queue-thereare=queue-thereare
queue-callswaiting=queue-callswaiting
queue-holdtime=queue-holdtime
queue-minutes=queue-minutes
queue-seconds=queue-seconds
queue-thankyou=queue-thankyou
; Não tentar se membro em ligação
ringinuse=no
; Auto-pause membro que não atende
autopause=yes
autopausedelay=0
autopausebusy=yes
autopauseunavail=yes
; Penalidade mínima e máxima
minpenalty=0
maxpenalty=0
; Relatórios
reportholdtime=yes
memberdelay=0
weight=0
timeoutrestart=no
timeoutpriority=conf
; Agentes dinâmicos
joinempty=yes
leavewhenempty=no

; ============================================================
; Filas de Atendimento
; ============================================================

; Fila Recepção Geral
[recepcao](queue_defaults)
announce=custom/fila-recepcao
strategy=rrmemory
timeout=25
wrapuptime=3
maxlen=30
weight=0
; Membros estáticos (serão gerenciados dinamicamente via AMI)
; member => SIP/1000,0,Agente 01
; member => SIP/1001,0,Agente 02

; Fila Suporte Técnico
[suporte](queue_defaults)
announce=custom/fila-suporte
strategy=leastrecent
timeout=30
wrapuptime=10
maxlen=50
weight=1
announce-frequency=60

; Fila Vendas
[vendas](queue_defaults)
announce=custom/fila-vendas
strategy=rrmemory
timeout=25
wrapuptime=5
maxlen=100
weight=2
announce-frequency=45

; Fila Financeiro
[financeiro](queue_defaults)
announce=custom/fila-financeiro
strategy=fewestcalls
timeout=30
wrapuptime=10
maxlen=30
weight=1
announce-frequency=60

; Fila Urgente (prioridade alta)
[urgente](queue_defaults)
strategy=ringall
timeout=20
wrapuptime=0
maxlen=10
weight=10
announce-frequency=20
