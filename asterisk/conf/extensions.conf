; ============================================================
; OmniSuite - Dialplan (extensions.conf)
; ============================================================

[globals]
TRUNK=omni_trunk_novacia_6130606738
TRUNK_PREFIX=9
RECORDING_DIR=/var/spool/asterisk/monitor
QUEUE_TIMEOUT=300
RING_TIMEOUT=30
TRANSFER_CONTEXT=from-internal

#include extensions_omni.conf

; ============================================================
; Context: unauthenticated
; Rejeita chamadas sem autenticação
; ============================================================
[unauthenticated]
exten => _.,1,Verbose(1,Chamada sem autenticacao rejeitada: ${CALLERID(all)})
 same => n,Hangup(21)

; ============================================================
; Context: from-trunk (chamadas externas recebidas)
; ============================================================
[from-trunk]
include => omni-inbound

; Chamadas recebidas na DID principal -> URA
exten => _X.,1,Verbose(1,Chamada externa recebida: ${CALLERID(num)} -> ${EXTEN})
 same => n,Set(CHANNEL(language)=pt_BR)
 same => n,Set(CDR(userfield)=external_inbound)
 same => n,Set(CALL_START=${EPOCH})
 same => n,Goto(omni-inbound,${EXTEN},1)

; ============================================================
; Context: from-internal (ramais internos)
; ============================================================
[from-internal]
include => from-internal-custom
include => omni-outbound

; Discagem entre ramais
exten => _1XXX,1,Verbose(1,Discagem interna: ${CALLERID(num)} -> ${EXTEN})
 same => n,Set(CDR(userfield)=internal)
 same => n,Set(RECORDING_FILE=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-${EXTEN})
 same => n,MixMonitor(${RECORDING_FILE}.wav,b,${AGI(agi://localhost/recording_done,${RECORDING_FILE}.wav)})
 same => n,Dial(SIP/${EXTEN},${RING_TIMEOUT},tTkK)
 same => n,Hangup()

; Discagem externa via tronco
exten => _9XXXXXXXXXX,1,Verbose(1,Discagem externa: ${CALLERID(num)} -> ${EXTEN:1})
 same => n,Set(CDR(userfield)=external_outbound)
 same => n,Set(RECORDING_FILE=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-${EXTEN:1})
 same => n,MixMonitor(${RECORDING_FILE}.wav,b)
 same => n,Dial(SIP/${TRUNK}/${EXTEN:1},${RING_TIMEOUT},tTkK)
 same => n,Hangup()

; Acesso às filas de atendimento
exten => _6XX,1,Verbose(1,Fila: ${CALLERID(num)} -> ${EXTEN})
 same => n,Goto(queues,${EXTEN},1)

; Voicemail
exten => *97,1,Verbose(1,Acesso voicemail)
 same => n,VoiceMailMain(${CALLERID(num)}@default,s)
 same => n,Hangup()

; Pickup de chamada
exten => *8,1,Verbose(1,Pickup: ${CALLERID(num)})
 same => n,Pickup(${CALLERID(num)}@from-internal)
 same => n,Hangup()

; Transferência supervisionada
exten => *2,1,Verbose(1,Transferencia supervisionada)
 same => n,Hangup()

; Sala de conferência
exten => _9XXX,1,Verbose(1,Conferencia: ${EXTEN})
 same => n,ConfBridge(${EXTEN:1})
 same => n,Hangup()

; Checar status do agente (para auto-atendimento)
exten => h,1,Verbose(1,Chamada encerrada: ${CALLERID(num)})
 same => n,UserEvent(HangupEvent,Channel: ${CHANNEL},CallerID: ${CALLERID(num)},Duration: ${CDR(duration)})

; ============================================================
; Context: ivr-main (URA Principal)
; ============================================================
[ivr-main]
exten => s,1,Verbose(1,URA Principal iniciada)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Set(CHANNEL(language)=pt_BR)
 same => n,Background(custom/bem-vindo)
 same => n,WaitExten(5)
 same => n,Goto(s,1)

; Opção 1 - Suporte Técnico (Fila 601)
exten => 1,1,Verbose(1,URA: Suporte Tecnico)
 same => n,Set(QUEUE_PRIORITY=1)
 same => n,Goto(queues,601,1)

; Opção 2 - Vendas (Fila 602)
exten => 2,1,Verbose(1,URA: Vendas)
 same => n,Set(QUEUE_PRIORITY=1)
 same => n,Goto(queues,602,1)

; Opção 3 - Financeiro (Fila 603)
exten => 3,1,Verbose(1,URA: Financeiro)
 same => n,Set(QUEUE_PRIORITY=1)
 same => n,Goto(queues,603,1)

; Opção 0 - Recepção (Fila 600)
exten => 0,1,Verbose(1,URA: Recepcao)
 same => n,Goto(queues,600,1)

; Timeout / Invalid
exten => t,1,Verbose(1,URA: Timeout)
 same => n,Playback(custom/opcao-invalida)
 same => n,Goto(s,1)

exten => i,1,Verbose(1,URA: Opcao invalida)
 same => n,Playback(custom/opcao-invalida)
 same => n,Goto(s,1)

exten => h,1,Verbose(1,URA: Desligou)
 same => n,Hangup()

; ============================================================
; Context: queues (Filas de Atendimento)
; ============================================================
[queues]
; Fila 600 - Recepção Geral
exten => 600,1,Verbose(1,Fila Geral: ${CALLERID(num)})
 same => n,Set(CALL_START=${EPOCH})
 same => n,Set(RECORDING_FILE=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-queue600)
 same => n,MixMonitor(${RECORDING_FILE}.wav,b)
 same => n,Queue(recepcao,tTHhc,,,${QUEUE_TIMEOUT})
 same => n,Goto(queues,600-fallback,1)

exten => 600-fallback,1,Verbose(1,Fila vazia, redirecionando para voicemail)
 same => n,Playback(custom/nenhum-atendente)
 same => n,VoiceMail(2000@default,u)
 same => n,Hangup()

; Fila 601 - Suporte Técnico
exten => 601,1,Verbose(1,Fila Suporte: ${CALLERID(num)})
 same => n,Set(RECORDING_FILE=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-queue601)
 same => n,MixMonitor(${RECORDING_FILE}.wav,b)
 same => n,Queue(suporte,tTHhc,,,${QUEUE_TIMEOUT})
 same => n,Goto(queues,601-fallback,1)

exten => 601-fallback,1,Verbose(1,Suporte: fila vazia)
 same => n,Playback(custom/nenhum-atendente)
 same => n,VoiceMail(2000@default,u)
 same => n,Hangup()

; Fila 602 - Vendas
exten => 602,1,Verbose(1,Fila Vendas: ${CALLERID(num)})
 same => n,Set(RECORDING_FILE=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-queue602)
 same => n,MixMonitor(${RECORDING_FILE}.wav,b)
 same => n,Queue(vendas,tTHhc,,,${QUEUE_TIMEOUT})
 same => n,Goto(queues,602-fallback,1)

exten => 602-fallback,1,Verbose(1,Vendas: fila vazia)
 same => n,Playback(custom/nenhum-atendente)
 same => n,VoiceMail(2000@default,u)
 same => n,Hangup()

; Fila 603 - Financeiro
exten => 603,1,Verbose(1,Fila Financeiro: ${CALLERID(num)})
 same => n,Set(RECORDING_FILE=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-queue603)
 same => n,MixMonitor(${RECORDING_FILE}.wav,b)
 same => n,Queue(financeiro,tTHhc,,,${QUEUE_TIMEOUT})
 same => n,Goto(queues,603-fallback,1)

exten => 603-fallback,1,Verbose(1,Financeiro: fila vazia)
 same => n,Playback(custom/nenhum-atendente)
 same => n,VoiceMail(2000@default,u)
 same => n,Hangup()

; ============================================================
; Context: internal-features
; ============================================================
[internal-features]
; Transfer feature
exten => *1,1,Verbose(1,Transfer feature)
 same => n,Attended Transfer(from-internal)
 same => n,Hangup()
