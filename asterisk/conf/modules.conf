load => res_ari_mailboxes.so
load => res_ari_playbacks.so
load => res_ari_recordings.so
load => res_ari_sounds.so

; Core applications expected by the dialplan.
load => app_dial.so
load => app_queue.so
load => app_voicemail.so
load => app_record.so
load => app_playback.so
