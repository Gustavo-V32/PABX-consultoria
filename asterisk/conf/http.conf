; ============================================================
; OmniSuite - Asterisk HTTP / ARI Configuration
; ============================================================

[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088
prefix=asterisk
sessionlimit=100
session_inactivity=30000
session_keep_alive=15000
; TLS (optional)
;tlsenable=yes
;tlsbindaddr=0.0.0.0:8089
;tlscertfile=/etc/asterisk/keys/asterisk.crt
;tlsprivatekey=/etc/asterisk/keys/asterisk.key
