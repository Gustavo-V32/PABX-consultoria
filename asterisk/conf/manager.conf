; ============================================================
; OmniSuite - Asterisk Manager Interface (AMI)
; ============================================================

[general]
enabled=yes
port=5038
bindaddr=0.0.0.0
displayconnects=yes
timestampevents=yes
; Allow from backend container only
; In production, restrict to specific IPs

[omni_ami]
secret=REPLACE_AMI_SECRET
deny=0.0.0.0/0.0.0.0
permit=172.20.0.0/255.255.0.0
permit=127.0.0.1/255.255.255.255
read=system,call,log,verbose,command,agent,user,config,dtmf,reporting,cdr,dialplan,originate,message
write=system,call,log,verbose,command,agent,user,config,dtmf,reporting,cdr,dialplan,originate,message
eventmask=on
writetimeout=5000
