; ============================================================
; OmniSuite - SIP Configuration
; ============================================================

[general]
context=unauthenticated
allowguest=no
allowoverlap=no
udpbindaddr=0.0.0.0
tcpenable=yes
tcpbindaddr=0.0.0.0
tlsenable=no
transport=udp,tcp
srvlookup=yes
qualify=yes
qualifyfreq=60
defaultexpiry=120
minexpiry=60
maxexpiry=3600
disallow=all
allow=alaw
allow=ulaw
allow=g722
allow=opus
nat=force_rport,comedia
directmedia=no
videosupport=no
maxcallbitrate=384
rtptimeout=60
rtpholdtimeout=300
session-timers=refuse
dtmfmode=rfc2833
language=pt_BR
tos_sip=cs3
tos_audio=ef
cos_sip=3
cos_audio=5
; AMI user for OmniSuite backend
[omni_ami_user]
type=user
secret=REPLACE_AMI_SECRET
read=all
write=all
eventmask=all

; ============================================================
; SIP Trunks - add your SIP providers here
; ============================================================

; Example: VoIP.ms trunk
;[voipms_trunk]
;type=peer
;host=voip.ms
;username=YOUR_USERNAME
;secret=YOUR_PASSWORD
;fromuser=YOUR_USERNAME
;fromdomain=voip.ms
;insecure=port,invite
;nat=force_rport,comedia
;qualify=yes
;disallow=all
;allow=ulaw
;allow=alaw
;context=from-trunk

; Example: Generic SIP provider
;[provider_trunk]
;type=friend
;host=sip.provider.com.br
;username=CONTA_SIP
;secret=SENHA_SIP
;fromuser=CONTA_SIP
;insecure=port,invite
;qualify=yes
;disallow=all
;allow=alaw
;allow=ulaw
;context=from-trunk

; ============================================================
; Internal Extensions (Ramais)
; Extensions 1000-1999: Agents
; Extensions 2000-2099: Supervisors
; Extensions 2100-2199: Admins
; Extensions 9000-9099: Conference rooms
; ============================================================

[ramal_template](!)
type=friend
context=from-internal
host=dynamic
disallow=all
allow=alaw
allow=ulaw
allow=g722
nat=force_rport,comedia
qualify=yes
dtmfmode=rfc2833
callcounter=yes
busylevel=1
subscribecontext=from-internal
notifyringing=yes
notifyhold=yes
pickupgroup=1
callgroup=1

; --- Agentes (1000-1099) ---
[1000](ramal_template)
secret=CHANGE_ME
callerid="Agente 01" <1000>
mailbox=1000@default

